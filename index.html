<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subset Sum (Responsive)</title>

<style>
* { box-sizing: border-box; }

body {
    font-family: Tahoma, sans-serif;
    background: #f5f6fa;
    margin: 0;
    padding: 15px;
}

.container {
    max-width: 960px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

h2 {
    margin-top: 0;
    text-align: center;
}

form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

label {
    font-weight: bold;
}

input[type=text] {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button.calc {
    background: #3498db;
    color: #fff;
}

button.calc:hover {
    background: #2980b9;
}

button.clear {
    background: #e0e0e0;
}

button.clear:hover {
    background: #cfcfcf;
}

.result {
    margin-top: 20px;
}

.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: center;
    white-space: nowrap;
}

th {
    background: #f0f0f0;
}
button.move {
    background: #9b59b6;
    color: #fff;
}

button.move:hover {
    background: #8e44ad;
}
/* Tablet / Desktop */
@media (min-width: 768px) {
    form {
        flex-direction: row;
        flex-wrap: wrap;
    }

    .field {
        flex: 1 1 48%;
    }

    .field.full {
        flex: 1 1 100%;
    }

    .buttons {
        flex: 1 1 100%;
        justify-content: flex-end;
    }

    button {
        max-width: 200px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h2>Subset Sum</h2>

    <form id="calcForm">
        <div class="field full">
            <label>ชุดตัวเลข</label>
            <input type="text" id="numbers" placeholder="เช่น 160 81 63 81">
            <small>คั่นด้วยเว้นวรรค , หรือ |</small>
        </div>

        <div class="field">
            <label>ผลรวมเป้าหมาย</label>
            <input type="text" id="target" placeholder="เช่น 215">
        </div>

        <div class="buttons">
    <button type="submit" class="calc">คำนวณ</button>
    <button type="button" class="clear" id="clearBtn">Clear</button>
    <button type="button" class="move" id="moveCursorBtn">ไปท้ายข้อความ</button>
</div>
    </form>

    <div id="output" class="result"></div>
</div>

<script>
var form = document.getElementById('calcForm');
var output = document.getElementById('output');

form.addEventListener('submit', function(e) {
    e.preventDefault();

    var raw = document.getElementById('numbers').value;
    var target = parseInt(document.getElementById('target').value, 10);
    if (isNaN(target)) return;

    var numbers = raw.split(/[\s,|]+/)
        .map(Number)
        .filter(function(n) { return !isNaN(n); });

    var result = { maxSum: 0, sets: [] };

    function backtrack(index, currentSet, currentSum) {
        if (currentSum > target) return;

        if (currentSum >= result.maxSum) {
            if (currentSum > result.maxSum) {
                result.maxSum = currentSum;
                result.sets = [];
            }
            result.sets.push(currentSet.slice());
        }

        for (var i = index; i < numbers.length; i++) {
            currentSet.push(numbers[i]);
            backtrack(i + 1, currentSet, currentSum + numbers[i]);
            currentSet.pop();
        }
    }

    backtrack(0, [], 0);

    var rows = [];
    result.sets.forEach(function(set) {
        var sum = set.reduce(function(a, b) { return a + b; }, 0);
        if (sum === result.maxSum) {
            set.sort(function(a, b) { return b - a; });
            rows.push({
                set: set,
                max: set[0],
                count: set.length
            });
        }
    });

    rows.sort(function(a, b) {
        return b.max - a.max;
    });

    var html = '<h3>ผลรวมที่มากที่สุด: ' + result.maxSum + '</h3>';
    html += '<div class="table-wrapper"><table>';
    html += '<tr><th>#</th><th>ชุดตัวเลข</th><th>ตัวเลขใหญ่สุด</th><th>จำนวน</th><th>ผลรวม</th></tr>';

    rows.forEach(function(r, i) {
        html += '<tr>';
        html += '<td>' + (i + 1) + '</td>';
        html += '<td>' + r.set.join(' + ') + '</td>';
        html += '<td>' + r.max + '</td>';
        html += '<td>' + r.count + '</td>';
        html += '<td>' + result.maxSum + '</td>';
        html += '</tr>';
    });

    html += '</table></div>';

    output.innerHTML = html;
});

// -------- Clear Form --------
document.getElementById('clearBtn').addEventListener('click', function() {
    form.reset();
    output.innerHTML = '';
});

    // -------- Move Cursor To End --------
document.getElementById('moveCursorBtn').addEventListener('click', function() {
    var input = document.getElementById('numbers');
    var len = input.value.length;

    input.focus();

    // รองรับ browser ทั่วไป
    if (typeof input.setSelectionRange === "function") {
        input.setSelectionRange(len, len);
    }
});
</script>

</body>
</html>
