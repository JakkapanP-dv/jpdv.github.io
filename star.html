<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมเปิดแผ่นป้าย 13 แผ่น</title>
    <style>
        /* นำเข้าฟอนต์ Google Sans */
        @font-face {
            font-family: 'Google Sans';
            src: url('https://fonts.gstatic.com/s/productsans/v5/HYvgU2fE2nRJvZ5JFAumwegdm0LZdjqr5-oayXSOefg.woff2') format('woff2');
            font-weight: normal;
        }
        @font-face {
            font-family: 'Google Sans';
            src: url('https://fonts.gstatic.com/s/productsans/v5/llUll7iAONyZGEeHDE8LXvlMlpPqlH_X3ooyxy8A23M.woff2') format('woff2');
            font-weight: bold;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        /* ตาราง 7x2 Responsive */
        #game-board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 900px; /* จำกัดขนาดสูงสุดไม่ให้ใหญ่เกินไปในจอ PC */
        }

        /* ปรับให้รองรับหน้าจอขนาดเล็ก */
        @media (max-width: 768px) {
            #game-board {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 480px) {
            #game-board {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* รูปแบบแผ่นป้าย */
        .card {
            width: 100%;
            aspect-ratio: 1 / 1; /* บังคับให้เป็นสี่เหลี่ยมจัตุรัส */
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-front {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }

        .card-back {
            background-color: #1c1c1c; /* พื้นหลังสีดำด้าน (Matte Black) */
            transform: rotateY(180deg);
        }

        /* ลบ Hilight ตอนกดบนมือถือ */
        .card {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <h1>เกมเปิดแผ่นป้าย</h1>
    <div id="game-board"></div>

    <script>
        // 5 ขนาดของดวงดาวที่สุ่ม (คิดเป็นเปอร์เซ็นต์ของพื้นที่แผ่นป้าย)
        const starSizes = ['35%', '50%', '65%', '80%', '95%'];
        const totalCards = 13;
        const board = document.getElementById('game-board');

        // ฟังก์ชันสร้าง SVG ดาว 6 แฉกแบบ 3 มิติ
        function create3DStarSVG(size) {
            return `
                <svg viewBox="0 0 100 100" style="width: ${size}; height: ${size}; overflow: visible;">
                    <defs>
                        <filter id="3d-effect" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
                            <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1.2" specularExponent="20" lighting-color="#ffffff" result="specOut">
                                <fePointLight x="-20" y="-20" z="60" />
                            </feSpecularLighting>
                            <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut2" />
                            <feComposite in="SourceGraphic" in2="specOut2" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" />
                            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.9"/>
                        </filter>
                    </defs>
                    <g filter="url(#3d-effect)">
                        <path d="M50 0 L64.4 25 L93.3 25 L78.8 50 L93.3 75 L64.4 75 L50 100 L35.6 75 L6.7 75 L21.2 50 L6.7 25 L35.6 25 Z" fill="#ffffff" />
                    </g>
                </svg>
            `;
        }

        // สร้างแผ่นป้าย 13 แผ่น
        for (let i = 0; i < totalCards; i++) {
            const card = document.createElement('div');
            card.className = 'card';

            const cardInner = document.createElement('div');
            cardInner.className = 'card-inner';

            const cardFront = document.createElement('div');
            cardFront.className = 'card-front';
            cardFront.innerText = '?';

            const cardBack = document.createElement('div');
            cardBack.className = 'card-back';
            
            // สุ่มขนาดดาว 1 ใน 5 ขนาด
            const randomSize = starSizes[Math.floor(Math.random() * starSizes.length)];
            cardBack.innerHTML = create3DStarSVG(randomSize);

            // ประกอบ HTML
            cardInner.appendChild(cardFront);
            cardInner.appendChild(cardBack);
            card.appendChild(cardInner);

            // เพิ่ม Event คลิกเพื่อกลับด้าน
            card.addEventListener('click', () => {
                card.classList.toggle('flipped');
            });

            board.appendChild(card);
        }
    </script>
</body>
</html>
